<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ففروا إلى الله</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

<div class="overlay">

<img src="logo.jpg" class="logo" alt="الشعار">

<h1>فَفِرُّوا إِلَى اللَّه</h1>

<p class="subtitle">
لوحة نقاط الطلاب
</p>

</div>

</header>

<main class="container">

<section class="search-box">

<input
type="text"
id="search"
placeholder="🔍 ابحث عن اسم الطالب...">

</section>

<section class="filters">

  
<!--
<button class="filter-btn active" data-filter="all">
📋 الجميع
</button>  -->

<button class="filter-btn active" data-filter="boys">
👦 الأولاد
</button>

<button class="filter-btn" data-filter="girls">
👧 البنات
</button>

</section>

<section class="statistics">

<div class="stat-card">

<span class="stat-icon">
👥
</span>

<div>

<h3>عدد الطلاب</h3>

<p id="studentsCount">
0
</p>

</div>

</div>

<div class="stat-card">

<span class="stat-icon">
💎
</span>

<div>

<h3>إجمالي النقاط</h3>

<p id="pointsCount">
0
</p>

</div>

</div>

</section>
  
<div id="loading" class="loading">
⏳ يتم تحميل بيانات الطلاب...<br>
فَصَبْرٌ جَمِيلٌ وَاللَّهُ الْمُسْتَعَانُ...
</div>
  
<section
class="cards"
id="cards">

<!-- سيتم إنشاء البطاقات تلقائياً -->

</section>

</main>
  <button id="rewardBtn" class="reward-btn">
🎁 استلام النقاط
</button>

<div id="rewardModal" class="modal">

  <div class="modal-box">

    <h3>🎁 استلام النقاط</h3>

    <select id="studentSelect"></select>

    <input
      type="text"
      id="rewardCode"
      placeholder="أدخل الكود">

    <button id="sendReward">
      استلام النقاط
    </button>

    <button id="closeReward">
      إغلاق
    </button>

    <p id="rewardMessage"></p>

  </div>

</div>
<div class="whatsapp-box">

<h3>📱 مجموعة الواتساب</h3>

<p>
"فَفِرُّوا إلىٰ اللهِ"
</p>

<a href="https://chat.whatsapp.com/ISuJUCU31U8DdjYEAITmye?s=cl&p=a&ilr=1"
target="_blank"
class="whatsapp-btn">

انضم الآن

</a>

</div>
  <div class="salawat-card">
  صلِّ على النبي ﷺ 💚 
  </div>
<footer>

© ففروا إلى الله

</footer>

<script type="module" src="script.js"></script>

</body>

</html>
