function randomCode(){

return Math.floor(

100000+

Math.random()*900000

).toString();

}
async function readCsvCodes(files){

    const codes = new Set();

    for(const file of files){

        const text = await file.text();

        const lines = text.split(/\r?\n/);

        for(let line of lines){

            line = line.trim();

            if(!line) continue;

            if(line.startsWith("الكود")) continue;

            const parts = line.replace(/"/g,"").split(",");

            if(parts[0]){
codes.add(parts[0].trim());

            }

        }

    }

    return codes;

    }
async function loadExistingCodes(){

const set=

new Set();

const snapshot=

await getDocs(

collection(

db,

"Codes"

)

);

snapshot.forEach(doc=>{

set.add(

doc.data().code

);

});

return set;

}

async function createCard(code){

return new Promise((resolve)=>{

const template=

document.querySelector(

'input[name="template"]:checked'

).value;

const img=

new Image();

img.src=

`${template}.jpg`;

img.onload=()=>{

const canvas=

document.createElement(

"canvas"

);

canvas.width=

img.width;

canvas.height=

img.height;

const ctx=

canvas.getContext(

"2d"

);

ctx.drawImage(

img,

0,

0

);

const fontSize=

Number(

document.getElementById(

"fontSize"

).value

);

const fontFamily=

document.getElementById(

"fontFamily"

).value;

const textColor=

document.getElementById(

"textColor"

).value;

ctx.font=

`bold ${fontSize}px "${fontFamily}"`;

ctx.fillStyle=

textColor;

ctx.textAlign=

"center";

ctx.textBaseline=

"middle";
ctx.fillText(
    code.split("").join(" "),
    1535,
    880
);
           // ctx.fillText(
 //   code.split("").join(" "),
//    canvas.width / 2,
//    canvas.height / 2
//);

            canvas.toBlob(

                (blob)=>{

                    resolve(blob);

                },

                "image/png"

            );

        };

    });

}

async function addCardToPdf(

pdf,

imageBlob,

index

){

const imageUrl=

URL.createObjectURL(

imageBlob

);

const img=

new Image();

await new Promise(resolve=>{

img.onload=

resolve;

img.src=

imageUrl;

});

const canvas =
document.createElement("canvas");

const scale = 900 / img.width;

canvas.width = 900;

canvas.height = Math.round(img.height * scale);

const ctx=

canvas.getContext(

"2d"

);

ctx.drawImage(
    img,
    0,
    0,
    canvas.width,
    canvas.height
);

const imageData=

canvas.toDataURL("image/jpeg", 0.8);

const col=

index%3;

const row=

Math.floor(

index/3

)%7;

const cardWidth = 60;
const cardHeight = cardWidth * img.height / img.width;

const marginX=

8;

const marginY=

8;

const spaceX=

6;

const spaceY=

4;

const x=

marginX+

col*(cardWidth+spaceX);

const y=

marginY+

row*(cardHeight+spaceY);

pdf.addImage(

    imageData,

    "JPEG",

    x,

    y,

    cardWidth,

    cardHeight

);

URL.revokeObjectURL(

imageUrl

);

}

let allCodes = [];

async function loadCodesTable() {

    status.innerHTML = "⏳ جار تحميل الأكواد...";

    const tbody = document.querySelector("#codesTable tbody");

    tbody.innerHTML = "";

    const snapshot = await getDocs(
        collection(db, "Codes")
    );

    allCodes = [];

snapshot.forEach(doc => {

    allCodes.push({
        id: doc.id,
        ...doc.data()
    });

});

allCodes.sort((a,b)=>{

    if(!a.createdAt || !b.createdAt) return 0;

    return b.createdAt.seconds - a.createdAt.seconds;

});

renderCodesTable();

    status.innerHTML = "";

}


function renderCodesTable() {

    const tbody = document.querySelector("#codesTable tbody");

    tbody.innerHTML = "";

    const search = document
        .getElementById("searchCode")
        .value
        .trim()
        .toLowerCase();

    const filter = document
        .getElementById("filterUsed")
        .value;

    let total = 0;
    let used = 0;
    let unused = 0;
allCodes.forEach(item => {

        total++;

        if (item.used)
            used++;
        else
            unused++;

        if (
            search &&
            !item.code.toLowerCase().includes(search) &&
            !(item.student || "")
                .toLowerCase()
                .includes(search)
        ) {
            return;
        }

        if (
            filter != "all" &&
String(item.used) != filter
        ) {
            return;
        }

        tbody.innerHTML += `


<tr>
<td>

<input
type="checkbox"
class="rowCheck"
data-id="${item.id}">

</td>

<td>${item.code}</td>

<td>${item.points}</td>

<td>${item.student || "-"}</td>

<td>

${item.used ? "✅" : "❌"}

</td>

<td>

${
item.createdAt?.toDate
? item.createdAt.toDate().toLocaleString("ar-EG")
: "-"
}

</td>

<td>

${
item.usedAt?.toDate
? item.usedAt.toDate().toLocaleString("ar-EG")
: "-"
}

</td>

<td>

<button
class="editBtn"
data-id="${item.id}">
تعديل
</button>

<button
class="deleteBtn"
data-id="${item.id}">
حذف
</button>

</td>

</tr>

`;

    });

    document.getElementById(
        "totalCodes"
    ).textContent = total;

    document.getElementById(
        "usedCodes"
    ).textContent = used;

    document.getElementById(
        "unusedCodes"
    ).textContent = unused;
updateSelectedButton();
}
// =====================
// أزرار الجدول
// =====================
// تحديث عدد العناصر المحددة

function updateSelectedButton(){

    const checks =
        document.querySelectorAll(".rowCheck:checked");

    const btn =
        document.getElementById("deleteSelected");

    const count =
        document.getElementById("selectedCount");

    count.textContent = checks.length;

    btn.style.display =
        checks.length ? "block" : "none";

    const all =
        document.querySelectorAll(".rowCheck");
const selectBtn =
        document.getElementById("selectAll");

    if(selectBtn){

        selectBtn.textContent =
            (all.length > 0 && checks.length === all.length)
            ? "إلغاء تحديد الكل"
            : "تحديد الكل";

    }

}
document.addEventListener("change",(e)=>{

    if(e.target.classList.contains("rowCheck")){

        updateSelectedButton();

    }

});

document.addEventListener("click", async (e)=>{
// =====================
// حذف المحدد
// =====================

if(e.target.id=="deleteSelected"){

    const ids = [];

    document
    .querySelectorAll(".rowCheck:checked")
    .forEach(c=>{

        ids.push(c.dataset.id);

    });

    if(ids.length==0)
        return;
if(!confirm(`حذف ${ids.length} كود؟`))
        return;

    for(const id of ids){

        await deleteDoc(
            doc(db,"Codes",id)
        );

    }

    allCodes =
        allCodes.filter(
            x=>!ids.includes(x.id)
        );

    renderCodesTable();

    updateSelectedButton();

    return;

}
    // =====================
    // حذف كود
    // =====================

    if(e.target.classList.contains("deleteBtn")){

        const id = e.target.dataset.id;

        if(!confirm("هل تريد حذف هذا الكود؟"))
            return;

        await deleteDoc(
            doc(db,"Codes",id)
        );

        allCodes = allCodes.filter(x=>x.id!=id);

        renderCodesTable();

        return;
    }

    // =====================
    // تعديل كود
    // =====================

    if(e.target.classList.contains("editBtn")){

        const id = e.target.dataset.id;

        const item = allCodes.find(x=>x.id==id);

        if(!item)
            return;

        const newPoints = prompt(
            "عدد الجواهر",
            item.points
        );

        if(newPoints===null)
            return;

        const newStudent = prompt(
            "اسم الطالب",
            item.student || ""
        );

        if(newStudent===null)
            return;

        const usedAnswer = confirm(
            "هل الكود مستخدم؟"
        );

        const updateData = {

    points:Number(newPoints),

    student:newStudent,

    used:usedAnswer

};

if(

    usedAnswer &&

    !item.used

){

    updateData.usedAt = serverTimestamp();

}
if(!usedAnswer){

    updateData.usedAt = null;

}

await updateDoc(

    doc(db,"Codes",id),

    updateData

);
        item.points = Number(newPoints);

        item.student = newStudent;

        item.used = usedAnswer;

        renderCodesTable();

    }

});
    if(document.getElementById("searchCode")){

    document.getElementById("refreshTable").onclick = loadCodesTable;

    document.getElementById("searchCode").oninput = renderCodesTable;

    document.getElementById("filterUsed").onchange = renderCodesTable;

    window.addEventListener("load", loadCodesTable);
document.getElementById("selectAll").onclick = () => {

    const checks = document.querySelectorAll(".rowCheck");

    if (checks.length === 0) return;

    const checked = document.querySelectorAll(".rowCheck:checked");

    const selectAll = checked.length !== checks.length;

    checks.forEach(c => {
        c.checked = selectAll;
    });

    updateSelectedButton();

};
        
    
}

document.getElementById("keepCsvOnly").onclick = async ()=>{

    const files = csvFiles;
    
    if(files.length==0){

        alert("اختر ملفات CSV أولاً");

        return;

    }

    if(!confirm("سيتم حذف جميع الأكواد غير الموجودة داخل ملفات CSV. هل أنت متأكد؟")){

        return;

    }

    status.innerHTML="📄 جار قراءة ملفات CSV...";

    const keepCodes =
        await readCsvCodes(files);
status.innerHTML="☁️ جار مقارنة الأكواد...";

    const snapshot =
        await getDocs(collection(db,"Codes"));

    let deleted=0;

    let total=snapshot.docs.length;

    progressBar.style.display="block";

    progressBar.value=0;

    for(const d of snapshot.docs){

        const data=d.data();

        if(!keepCodes.has(data.code)){

            await deleteDoc(d.ref);

            deleted++;
}

        progressBar.value++;

        progressBar.max=total;

        status.innerHTML=
        `تم فحص ${progressBar.value} من ${total}`;

    }

    progressBar.style.display="none";

    alert(`تم حذف ${deleted} كود`);

    loadCodesTable();

};
    document.getElementById("exportUsed").onclick = async ()=>{

    status.innerHTML = "⏳ جار استخراج الأكواد المستخدمة...";

    const snapshot = await getDocs(
        collection(db,"Codes")
    );

    let csv = "الكود,الجواهر,الطالب\n";

    let count = 0;

    snapshot.forEach(doc=>{

        const data = doc.data();

        if(data.used){

            csv += `"${data.code}","${data.points}","${data.student || ""}"\n`;

            count++;

        }

    });

    const blob = new Blob(

        [csv],

        {

            type:"text/csv;charset=utf-8;"

        }

    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;

    a.download = "الأكواد_المستخدمة.csv";

    a.click();

    URL.revokeObjectURL(url);

    status.innerHTML = `✅ تم حفظ ${count} كود مستخدم`;

};
    document.getElementById("csvFile").addEventListener("change",(e)=>{

    const file = e.target.files[0];

    if(!file) return;

    if(!csvFiles.find(f=>f.name===file.name && f.size===file.size)){

        csvFiles.push(file);

    }

    document.getElementById("csvFilesList").innerHTML =
        csvFiles.map(f=>"📄 "+f.name).join("<br>");

    e.target.value = "";

});
</script>
