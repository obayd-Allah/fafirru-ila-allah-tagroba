<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>إنشاء الأكواد</title>

<style>

body{

font-family:Cairo,sans-serif;
background:#f3f7fb;
padding:25px;
text-align:center;

}

.box{

max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);

}

h2{

color:#1b5e20;

}

input{

width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;

}

button{

width:100%;
padding:14px;
font-size:20px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
cursor:pointer;

}

button:hover{

background:#1b5e20;

}

#status{

margin-top:20px;
font-size:18px;

}
#templates{

display:flex;

justify-content:center;

gap:15px;

margin-top:20px;

flex-wrap:wrap;

}


.cardOption{

cursor:pointer;

}
.cardOption img{

width:120px;

border-radius:12px;

border:4px solid transparent;

transition:.2s;

}


.cardOption input{

display:none;

}
.cardOption input:checked+img{

border:4px solid #2e7d32;

transform:scale(1.05);

}
</style>

</head>

<body>

<div class="box">

<h2>

إنشاء أكواد المكافآت

</h2>

<input
id="count"
type="number"
value="100"
placeholder="عدد الأكواد">

<input
id="points"
type="number"
value="10"
placeholder="عدد النقاط">

  <h3>اختر تصميم البطاقة</h3>

<div id="templates">

<label class="cardOption">

<input
type="radio"
name="template"
value="10"
checked>

<img src="templates/10.png">

</label>


<label class="cardOption">

<input
type="radio"
name="template"
value="20">

<img src="templates/20.png">

</label>


<label class="cardOption">

<input
type="radio"
name="template"
value="30">

<img src="templates/30.png">

</label>

</div>
  
<button
id="create">

إنشاء الأكواد

</button>
<button id="deleteAll">
🗑️ حذف جميع الأكواد
</button>
<div id="status"></div>

</div>
  <br><br>

<progress
id="progressBar"
value="0"
max="100"
style="
width:100%;
height:24px;
display:none;
">
</progress>
<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- FileSaver -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module">

import { initializeApp }

from

"https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
const firebaseConfig={

apiKey:"AIzaSyCI3KykpatQW82_O5LuRoajP8oWhhMw4Zg",

authDomain:"fafirru-ila-allah.firebaseapp.com",

projectId:"fafirru-ila-allah",

storageBucket:"fafirru-ila-allah.firebasestorage.app",

messagingSenderId:"564958663441",

appId:"1:564958663441:web:9e6e6a246ec0e2c48472b0"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);
async function loadExistingCodes(){

const set=new Set();

const snapshot=
await getDocs(collection(db,"Codes"));

snapshot.forEach(doc=>{

set.add(doc.data().code);

});

return set;

}
const status=document.getElementById("status");
const progressBar =
document.getElementById("progressBar");
  
function randomCode(){

return Math.floor(
100000+Math.random()*900000
).toString();

}

document.getElementById("create").onclick=async()=>{
alert("بدأ التنفيذ");
  
const count=Number(
document.getElementById("count").value
);

const points=Number(
document.getElementById("points").value
);

if(count<=0||points<=0){

alert("أدخل قيماً صحيحة.");
return;

}

const used=
await loadExistingCodes();

let csv="الكود,النقاط\n";

status.innerHTML="⏳ جارٍ إنشاء الأكواد...";

let created=0;
  progressBar.style.display="block";
while(created<count){

const code=randomCode();

if(used.has(code))
continue;

used.add(code);

await addDoc(

collection(db,"Codes"),

{

code:code,

points:points,

student:"",
used:false

}

);

csv+=`${code},${points}\n`;

created++;

progressBar.value =
(created/count)*100;

status.innerHTML =
`⏳ تم إنشاء ${created} من ${count}`;
  
}
  
const blob=new Blob(

[csv],

{

type:"text/csv;charset=utf-8;"

}

);

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;

a.download="codes.csv";

document.body.appendChild(a);
a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

status.innerHTML=
`✅ تم إنشاء ${count} كود بنجاح.`;

alert("تم إنشاء الأكواد وتنزيل ملف CSV.");

document.getElementById("deleteAll").onclick = async () => {

if(!confirm("هل تريد حذف جميع الأكواد؟"))
return;

const snapshot = await getDocs(collection(db,"Codes"));

let count = 0;

for(const d of snapshot.docs){

await deleteDoc(d.ref);

count++;

status.innerHTML =
`⏳ تم حذف ${count} كود`;

};
progressBar.value=100;
status.innerHTML =
`✅ تم حذف جميع الأكواد بنجاح.`;

alert("تم حذف جميع الأكواد.");

};
</script>

</body>

</html>
