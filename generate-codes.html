<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>إنشاء أكواد المكافآت</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@700&family=Changa:wght@700&family=Baloo+Bhaijaan+2:wght@700&family=Aref+Ruqaa:wght@700&family=Amiri:wght@700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:Cairo,sans-serif;

background:#eef5fb;

padding:25px;

}

.box{

max-width:520px;

margin:auto;

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 0 20px rgba(0,0,0,.12);

}

h2{

text-align:center;

color:#1b5e20;

margin-bottom:20px;

}

label{

display:block;

margin-top:15px;

margin-bottom:6px;

font-weight:bold;

color:#444;

}

input,

select{

width:100%;

padding:12px;

font-size:18px;

border-radius:10px;

border:1px solid #ccc;

font-family:Cairo;

}

button{

width:100%;

padding:14px;

margin-top:15px;

font-size:20px;

border:none;

border-radius:10px;

cursor:pointer;

font-family:Cairo;

}

#create{

background:#2e7d32;

color:white;

}

#create:hover{

background:#1b5e20;

}

#deleteAll{

background:#d32f2f;

color:white;

}

#deleteAll:hover{

background:#b71c1c;

}

#templates{

display:flex;

gap:12px;

justify-content:center;

flex-wrap:wrap;

margin-top:15px;

margin-bottom:20px;

}

.cardOption{

cursor:pointer;

}

.cardOption input{

display:none;

}

.cardOption img{

width:120px;

border-radius:12px;

border:4px solid transparent;

transition:.25s;

}

.cardOption input:checked+img{

border-color:#2e7d32;

transform:scale(1.05);

}

#status{

margin-top:20px;

text-align:center;

font-size:18px;

font-weight:bold;

color:#1b5e20;

}

#progressBar{

margin-top:20px;

width:100%;

height:24px;

display:none;

}

</style>

</head>

<body>

<div class="box">

<h2>

إنشاء أكواد المكافآت

</h2>

<label>

عدد الأكواد

</label>

<input
id="count"
type="number"
value="100">

<label>

عدد الجواهر

</label>

<input
id="points"
type="number"
value="10">

<label>

اختر تصميم البطاقة

</label>

<div id="templates">

<label class="cardOption">

<input
type="radio"
name="template"
value="10"
checked>

<img src="10.jpg">

</label>

<label class="cardOption">

<input
type="radio"
name="template"
value="20">

<img src="20.jpg">

</label>

<label class="cardOption">

<input
type="radio"
name="template"
value="30">

<img src="30.jpg">

</label>

</div>

<label>

لون الكود

</label>
<button type="button" onclick="textColor.value='#0065F3'">🔵</button>

<button type="button" onclick="textColor.value='#18D7CC'">🟢</button>

<button type="button" onclick="textColor.value='#000000'">⚫</button>
<input
type="color"
id="textColor"
value="#0065F3">

<label>

حجم الخط

</label>

<input
type="number"
id="fontSize"
value="82"
min="20"
max="180">

<label>

نوع الخط

</label>

<select
id="fontFamily">

<option value="Cairo">
Cairo
</option>

<option value="Tajawal">
Tajawal
</option>

<option value="Changa">
Changa
</option>

<option value="Baloo Bhaijaan 2">
Baloo Bhaijaan 2
</option>

<option value="Aref Ruqaa">
Aref Ruqaa
</option>

<option value="Amiri">
Amiri
</option>

</select>

<button
id="create">

إنشاء الأكواد

</button>

<button
id="deleteAll">

🗑️ حذف جميع الأكواد

</button>

<div id="status"></div>

<progress

id="progressBar"

value="0"

max="100">

</progress>
<button id="downloadCsv" style="display:none">
تنزيل ملف CSV
</button>

<button id="downloadZip" style="display:none">
تنزيل البطاقات ZIP
</button>

<button id="downloadPdf" style="display:none">
تنزيل ملف الطباعة PDF
</button>
</div>

<script
src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
</script>

<script
src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js">
</script>

<script
src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
</script>

<script type="module">

import { initializeApp }

from

"https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {

getFirestore,

collection,

addDoc,

getDocs,

deleteDoc

}

from

"https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyCI3KykpatQW82_O5LuRoajP8oWhhMw4Zg",

authDomain:"fafirru-ila-allah.firebaseapp.com",

projectId:"fafirru-ila-allah",

storageBucket:"fafirru-ila-allah.firebasestorage.app",

messagingSenderId:"564958663441",

appId:"1:564958663441:web:9e6e6a246ec0e2c48472b0"

};

const app=

initializeApp(

firebaseConfig

);

const db=

getFirestore(app);

const status=

document.getElementById("status");

const progressBar=

document.getElementById("progressBar");



function randomCode(){

return Math.floor(

100000+

Math.random()*900000

).toString();

}

async function loadExistingCodes(){

const set=

new Set();

const snapshot=

await getDocs(

collection(

db,

"Codes"

)

);

snapshot.forEach(doc=>{

set.add(

doc.data().code

);

});

return set;

}

async function createCard(code){

return new Promise((resolve)=>{

const template=

document.querySelector(

'input[name="template"]:checked'

).value;

const img=

new Image();

img.src=

`${template}.jpg`;

img.onload=()=>{

const canvas=

document.createElement(

"canvas"

);

canvas.width=

img.width;

canvas.height=

img.height;

const ctx=

canvas.getContext(

"2d"

);

ctx.drawImage(

img,

0,

0

);

const fontSize=

Number(

document.getElementById(

"fontSize"

).value

);

const fontFamily=

document.getElementById(

"fontFamily"

).value;

const textColor=

document.getElementById(

"textColor"

).value;

ctx.font=

`bold ${fontSize}px "${fontFamily}"`;

ctx.fillStyle=

textColor;

ctx.textAlign=

"center";

ctx.textBaseline=

"middle";

            ctx.fillText(

                code,

                canvas.width/2,

                canvas.height/2

            );

            canvas.toBlob(

                (blob)=>{

                    resolve(blob);

                },

                "image/png"

            );

        };

    });

}

async function addCardToPdf(

pdf,

imageBlob,

index

){

const imageUrl=

URL.createObjectURL(

imageBlob

);

const img=

new Image();

await new Promise(resolve=>{

img.onload=

resolve;

img.src=

imageUrl;

});

const canvas=

document.createElement(

"canvas"

);

canvas.width=

img.width;

canvas.height=

img.height;

const ctx=

canvas.getContext(

"2d"

);

ctx.drawImage(

img,

0,

0

);

const imageData=

canvas.toDataURL(

"image/png"

);

const col=

index%3;

const row=

Math.floor(

index/3

)%7;

const cardWidth=

60;

const cardHeight=

34;

const marginX=

8;

const marginY=

8;

const spaceX=

6;

const spaceY=

4;

const x=

marginX+

col*(cardWidth+spaceX);

const y=

marginY+

row*(cardHeight+spaceY);

pdf.addImage(

imageData,

"PNG",

x,

y,

cardWidth,

cardHeight

);

URL.revokeObjectURL(

imageUrl

);

}

document.getElementById(

"create"

).onclick=

async()=>{
            
const zip=

new JSZip();
const count=

Number(

document.getElementById(

"count"

).value

);

const points=

Number(

document.getElementById(

"points"

).value

);

if(

count<=0||

points<=0

){

alert(

"أدخل قيماً صحيحة."

);

return;

}

progressBar.value=0;

progressBar.style.display="block";

status.innerHTML=

"⏳ جارٍ إنشاء الأكواد...";

const used=

await loadExistingCodes();

let csv=

"الكود,الجواهر\n";

const {jsPDF}=

window.jspdf;

const pdf=

new jsPDF({

orientation:"portrait",

unit:"mm",

format:"a4"

});

let created=0;

while(created<count){

const code=

randomCode();

if(

used.has(code)

)

continue;

used.add(

code

);

await addDoc(

collection(

db,

"Codes"

),

{

code:code,

points:points,

student:"",

used:false

}

);

const card=

await createCard(

code

);

zip.file(

`${code}.png`,

card

);

await addCardToPdf(

pdf,

card,

created

);

if(

(created+1)%21===0

&&

created+1<count

){

pdf.addPage();

}

csv+=

`"${code}","${points}"\n`;

created++;

progressBar.value=

(created/count)*100;

status.innerHTML=

`⏳ تم إنشاء ${created} من ${count}`;

}

progressBar.value=

100;

const csvBlob=

new Blob(

[csv],

{

type:

"text/csv;charset=utf-8;"

}

);
const zipBlob = await zip.generateAsync({
    type: "blob"
});
window.csvBlob = csvBlob;

window.zipBlob = zipBlob;

window.pdf = pdf;

window.points = points;

document.getElementById(
"downloadCsv"
).style.display="block";

document.getElementById(
"downloadZip"
).style.display="block";

document.getElementById(
"downloadPdf"
).style.display="block";

status.innerHTML=

`✅ تم إنشاء ${count} كود بنجاح.`;

alert(

"تم إنشاء جميع الملفات بنجاح."

);

};
document.getElementById(
"downloadCsv"
).onclick=()=>{

const url=
URL.createObjectURL(
window.csvBlob
);

const a=
document.createElement("a");

a.href=url;

a.download=
`أكواد_${window.points}.csv`;

a.click();
URL.revokeObjectURL(url);

};
            document.getElementById(
"downloadZip"
).onclick=()=>{

saveAs(

window.zipBlob,

`بطاقات_${window.points}.zip`

);

};
            document.getElementById(
"downloadPdf"
).onclick=()=>{

window.pdf.save(

`بطاقات_${window.points}.pdf`

);

};
document.getElementById(

"deleteAll"

).onclick=

async()=>{

if(

!confirm(

"هل تريد حذف جميع الأكواد؟"

)

)

return;

progressBar.style.display=

"block";

progressBar.value=

0;

status.innerHTML=

"⏳ جارٍ حذف الأكواد...";

const snapshot=

await getDocs(

collection(

db,

"Codes"

)

);

const total=

snapshot.docs.length;

let deleted=

0;

for(

const doc

of

snapshot.docs

){

await deleteDoc(

doc.ref

);

deleted++;

if(total>0){

progressBar.value=

(deleted/total)*100;

}

status.innerHTML=

`⏳ تم حذف ${deleted} من ${total}`;

}

progressBar.value=

100;

status.innerHTML=

"✅ تم حذف جميع الأكواد بنجاح.";

alert(

"تم حذف جميع الأكواد."

);

};

</script>

</body>

</html>
