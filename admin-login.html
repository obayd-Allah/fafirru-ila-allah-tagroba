<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
دخول الأمانة
</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}


body{

font-family:"Cairo",sans-serif;

background:#eef5fb;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}


.box{

background:white;

width:100%;

max-width:400px;

padding:30px;

border-radius:20px;

box-shadow:0 0 20px rgba(0,0,0,.15);

text-align:center;

}


h2{

color:#1b5e20;

margin-bottom:25px;

}


input{

width:100%;

padding:14px;

font-size:18px;

border-radius:12px;

border:1px solid #ccc;

font-family:Cairo;

text-align:center;

}


button{

width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:12px;

font-size:18px;

font-family:Cairo;

cursor:pointer;

color:white;

}


#login{

background:#2e7d32;

}


.student{

background:#1976d2;

}


.codes{

background:#9c27b0;

}


#message{

margin-top:15px;

font-weight:bold;

}


.hidden{

display:none;

}

</style>

</head>


<body>


<div class="box">


<h2>
🔐 دخول الأمانة
</h2>


<input
id="password"
type="password"
placeholder="أدخل كلمة المرور">


<button id="login">
دخول بسم الله الرحمن الرحيم
</button>


<p id="message"></p>



<div id="buttons" class="hidden">


<button 
class="student"
onclick="location.href='student_admin.html'">

👨‍🎓 التلاميذ

</button>



<button 
class="codes"
onclick="location.href='generate-codes.html'">

🎁 الأكواد

</button>


</div>


</div>



<script>


const correctPassword = "الرحمن الرحيم";


const password =
document.getElementById("password");


const login =
document.getElementById("login");


const message =
document.getElementById("message");


const buttons =
document.getElementById("buttons");



login.onclick = ()=>{


if(password.value === correctPassword){


message.style.color="green";

message.textContent=
"تم بحمد لله رب العالمين تسجيل الدخول ✅ أُعْطِيت أمانة يا عُبيد الله";


buttons.classList.remove("hidden");


password.style.display="none";

login.style.display="none";


}

else{


message.style.color="red";

message.textContent=
"❌ كلمة المرور غير صحيحة";


}


};


password.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

login.click();

}

});


</script>


</body>

</html>
